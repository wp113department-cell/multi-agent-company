services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gridiron-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gridiron
      POSTGRES_PASSWORD: gridiron_dev_only
      POSTGRES_DB: gridiron_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
